services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: agricola-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Password12345678!}
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./db:/scripts
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD:-Password12345678!}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver_data:
